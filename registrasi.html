<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Pustaka Digital</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page active" id="page-register">

  <div class="auth-wrap">

    <div class="auth-panel-left">

      <div class="deco-lines"></div>

      <div class="auth-brand">
        <div class="logo-icon">✨</div>

        <h1>
          Bergabung<br>
          <em>Bersama Kami</em>
        </h1>

        <p>Komunitas Pembaca Digital</p>
      </div>

      <blockquote class="auth-quote">
        "Setiap buku adalah perjalanan baru.
        Biarkan halaman-halamannya membawamu
        ke dunia yang belum pernah kau bayangkan."
      </blockquote>

    </div>

    <div class="auth-panel-right">

      <div class="auth-form-box">

        <h2>Buat Akun Baru</h2>

        <div class="error-msg" id="register-error"></div>

        <div class="success-msg" id="register-success">
          Akun berhasil dibuat! Silahkan masuk.
        </div>

        <div class="form-group">
          <label>Nama Lengkap</label>

          <input
            type="text"
            id="reg-name"
            placeholder="Nama kamu"
          >
        </div>

        <div class="form-group">
          <label>Alamat Email</label>

          <input
            type="email"
            id="reg-email"
            placeholder="nama@email.com"
          >
        </div>

        <div class="form-group">
          <label>Kata Sandi</label>

          <input
            type="password"
            id="reg-password"
            placeholder="Min. 6 karakter"
          >
        </div>

        <div class="form-group">
          <label>Konfirmasi Kata Sandi</label>

          <input
            type="password"
            id="reg-confirm"
            placeholder="Ulangi kata sandi"
          >
        </div>

        <button
          type="button"
          class="btn-primary"
          onclick="register()"
        >
          Daftar Sekarang
        </button>

        <p class="subtitle">
          Sudah punya akun?
          <a href="login.html">
            Masuk di sini
          </a>
        </p>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
